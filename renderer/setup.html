<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigil — Setup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 400px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    p {
      color: #a0a0b0;
      margin-bottom: 2rem;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid #333355;
      border-radius: 8px;
      background: #16213e;
      color: #e0e0e0;
      outline: none;
      margin-bottom: 1rem;
    }

    input:focus {
      border-color: #5568f0;
    }

    input::placeholder {
      color: #555577;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #5568f0;
      color: #ffffff;
      cursor: pointer;
    }

    button:hover {
      background: #4455dd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Sigil</h1>
    <p>Enter the URL of your Open WebUI instance</p>
    <input type="url" id="url-input" placeholder="http://192.168.1.100:3000" autofocus>
    <button id="connect-btn">Connect</button>
  </div>
  <script src="setup.js"></script>
</body>
</html>
