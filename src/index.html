<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src *;">
  <title>Sigil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #1e1e1e;
      --bg-surface: #2a2a2a;
      --bg-input:   #333333;
      --bg-hover:   #3a3a3a;
      --border:     #444444;
      --text:       #d4d4d4;
      --text-dim:   #888888;
      --pastel-blue:   #7aa2f7;
      --pastel-green:  #9ece6a;
      --pastel-pink:   #f7768e;
      --pastel-purple: #bb9af7;
      --pastel-yellow: #e0af68;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Titlebar ── */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 38px;
      padding: 0 14px;
      background: #181818;
      -webkit-app-region: drag;
      user-select: none;
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .titlebar-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .win-btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.15s;
    }

    .win-btn.close    { background: var(--pastel-pink); }
    .win-btn.minimize { background: var(--pastel-yellow); }
    .win-btn.maximize { background: var(--pastel-green); }
    .win-btn:hover    { opacity: 0.7; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar input, .toolbar select {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .toolbar input:focus, .toolbar select:focus {
      border-color: var(--pastel-blue);
    }

    .toolbar input::placeholder { color: var(--text-dim); }

    #api-url { flex: 1; min-width: 0; }
    #model-select { min-width: 160px; }

    .btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn-connect {
      background: var(--pastel-blue);
      color: #1e1e1e;
    }
    .btn-connect:hover { opacity: 0.85; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--pastel-green); }
    .status-dot.error     { background: var(--pastel-pink); }

    /* ── Chat ── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: var(--pastel-blue);
      color: #1e1e1e;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: center;
      background: transparent;
      border: 1px solid var(--pastel-pink);
      color: var(--pastel-pink);
      font-size: 13px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text);
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      transition: border-color 0.15s;
    }

    #chat-input:focus { border-color: var(--pastel-blue); }
    #chat-input::placeholder { color: var(--text-dim); }

    .btn-send {
      background: var(--pastel-purple);
      color: #1e1e1e;
      padding: 10px 20px;
      align-self: flex-end;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <!-- Titlebar -->
  <div class="titlebar">
    <span class="titlebar-title">SIGIL</span>
    <div class="titlebar-controls">
      <button class="win-btn minimize" onclick="window.electronAPI.minimizeWindow()"></button>
      <button class="win-btn maximize" onclick="window.electronAPI.maximizeWindow()"></button>
      <button class="win-btn close"    onclick="window.electronAPI.closeWindow()"></button>
    </div>
  </div>

  <!-- Toolbar: API config + model select -->
  <div class="toolbar">
    <div class="status-dot" id="status-dot" title="Disconnected"></div>
    <input type="text" id="api-url" placeholder="API URL  (e.g. http://192.168.1.100:11434)" spellcheck="false">
    <button class="btn btn-connect" id="connect-btn">Connect</button>
    <select id="model-select" disabled>
      <option value="">No models</option>
    </select>
  </div>

  <!-- Chat area -->
  <div class="chat-container" id="chat-container">
    <div class="empty-state" id="empty-state">Connect to an API to start chatting</div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="chat-input" placeholder="Send a message..." rows="1" disabled></textarea>
    <button class="btn btn-send" id="send-btn" disabled>Send</button>
  </div>

  <script>
    const apiUrlInput    = document.getElementById('api-url');
    const connectBtn     = document.getElementById('connect-btn');
    const statusDot      = document.getElementById('status-dot');
    const modelSelect    = document.getElementById('model-select');
    const chatContainer  = document.getElementById('chat-container');
    const emptyState     = document.getElementById('empty-state');
    const chatInput      = document.getElementById('chat-input');
    const sendBtn        = document.getElementById('send-btn');

    let apiBase = '';
    let messages = []; // conversation history
    let isStreaming = false;

    // ── Connect to API ──
    connectBtn.addEventListener('click', connect);
    apiUrlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });

    async function connect() {
      const raw = apiUrlInput.value.trim().replace(/\/+$/, '');
      if (!raw) return;

      apiBase = raw;
      statusDot.className = 'status-dot';
      statusDot.title = 'Connecting...';
      modelSelect.disabled = true;
      modelSelect.innerHTML = '<option value="">Loading...</option>';

      try {
        const res = await fetch(`${apiBase}/v1/models`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const models = data.data || data.models || [];
        if (models.length === 0) throw new Error('No models found');

        modelSelect.innerHTML = '';
        models.forEach((m) => {
          const opt = document.createElement('option');
          opt.value = m.id || m.name;
          opt.textContent = m.id || m.name;
          modelSelect.appendChild(opt);
        });

        modelSelect.disabled = false;
        chatInput.disabled = false;
        sendBtn.disabled = false;
        statusDot.className = 'status-dot connected';
        statusDot.title = 'Connected';
      } catch (err) {
        modelSelect.innerHTML = '<option value="">Connection failed</option>';
        statusDot.className = 'status-dot error';
        statusDot.title = err.message;
        chatInput.disabled = true;
        sendBtn.disabled = true;
      }
    }

    // ── Chat ──
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () =>
    {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });

    async function sendMessage()
    {
      const text = chatInput.value.trim();
      if (!text || isStreaming || !modelSelect.value) return;

      // Clear empty state
      if (emptyState) emptyState.remove();

      // Add user message
      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      chatInput.value = '';
      chatInput.style.height = 'auto';

      // Create assistant message bubble for streaming
      const assistantEl = appendMessage('assistant', '');
      isStreaming = true;
      sendBtn.disabled = true;

      try
      {
        const res = await fetch(`${apiBase}/v1/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: messages,
            stream: true
          })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = '';
        let buffer = '';

        while (true)
        {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line in buffer

          for (const line of lines)
          {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const payload = trimmed.slice(6);
            if (payload === '[DONE]') continue;

            try
            {
              const json = JSON.parse(payload);
              const delta = json.choices?.[0]?.delta?.content;
              if (delta)
              {
                fullResponse += delta;
                assistantEl.textContent = fullResponse;
                chatContainer.scrollTop = chatContainer.scrollHeight;
              }
            }
            catch
            {}
          }
        }

        messages.push({ role: 'assistant', content: fullResponse });
      }
      catch (err)
      {
        appendMessage('error', `Error: ${err.message}`);
      }

      isStreaming = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }

    function appendMessage(role, content)
    {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = content;
      chatContainer.appendChild(el);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return el;
    }
  </script>
</body>
</html>
